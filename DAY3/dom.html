<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM</title>
</head>
<body>
  <!-- document.getElementById() : id로 원하는 요소를 얻음 -->
  <!-- document.getElementsByClassName() : class명으로 원하는 요소를 얻음 -->
  <!-- document.getElementsByTagName() : 태그로 원하는 요소를 얻음 -->
  <!-- document.querySelector() : id,class,tag 상관 없이 한 개의 값을 반환 -->
  <!-- document.querySelectorAll() : class,tag의 모든 값을 반환 -->

  <!-- getAttribute() : 속성 노드의 값을 가져옴 -->
  <!-- setAttribute() : 속성 노드의 값을 바꿈 -->

</body>
</html>
