<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM event 객체</title>
  <style>
    #container {
      width: 300px;
      margin: 10px auto;
    }
  </style>
</head>
<body>
  <div id="container">
    <img src="cup.png" id="cup" />
  </div>

  <script>
    var cup = document.querySelector("#cup");
    // cup.onclick = changePic;

    // function changePic() { // 클릭 시 이미지 변경
    //   cup.src = "cup2.png";
    // }

    cup.onclick = function() {
      alert("현재 이미지 파일 경로는 " + this.src); // this = click 이벤트가 발생한 대상(image)
    }

    // addEventListener(이벤트, 함수, 캡처 여부) - 캡처 여부: true면 캡처링, false면 버블링.
    // * 캡처링: DOM의 부모 노드에서 자식 노드로 전달
    // * 버블링: DOM의 자식 노드에서 부모 노드로 전달
  </script>
</body>
</html>
