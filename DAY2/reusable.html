<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재사용할 수 있는 함수</title>
</head>
<body>
  <script>
    function addNumber(num1, num2) { // 매개변수
      var sum = num1 + num2;
      return sum;
    }
    var result = addNumber(2, 3); // 인자 
    document.write("두 수를 더한 값 : " + result);

    // 즉시 실행 함수 (매개변수 ㅇ)
    (function(num1, num2) {
      sum = num1 + num2;
    }(10, 20));
    document.write("실행 결과: " + sum);

    // 즉시 실행 함수
    (function() {
      var userName = prompt("이름을 입력하세요");
      document.write("안녕하세요?" + userName + "님!");
    }());
  </script>
</body>
</html>
