<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>간단한 입출력 방법</title>
  <style>
    body { text-align: center; }
    h1 { color: blue; }
  </style>
</head>
<body>
  <h1>간단한 입출력 방법</h1>

  <script>
    // <웹 브라우저 출력 = 팝업창>
    alert("안녕하세요"); // 알림창
    confirm("배경 이미지를 바꾸시겠습니까?"); // 예,아니요 선택
    prompt("당신의 이름을 알려주세요."); // 입력값

    // <웹 브라우저 출력 = 웹 브라우저>
    document.write("안녕하세요"); //웹 브라우저 화면
    console.log("안녕하세요"); //콘솔창 = ctrl + shift + j
  </script>
</body>
</html>
